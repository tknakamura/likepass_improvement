name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: likepass
          POSTGRES_PASSWORD: likepass
          POSTGRES_DB: likepass_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://likepass:likepass@localhost:5432/likepass_test
      AUTH_SECRET: test-secret-for-ci-only-32chars!!
      AUTH_GOOGLE_ID: test-google-id
      AUTH_GOOGLE_SECRET: test-google-secret
      AUTH_TRUST_HOST: "true"
      APP_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - run: npx prisma migrate deploy

      - run: npm run db:seed

      - run: npm run lint

      - run: npm run typecheck

      - run: npm run test

      - run: npm run build

      - run: npx playwright install --with-deps chromium

      - run: npm start &
        env:
          PORT: 3000

      - run: npx wait-on http://localhost:3000 --timeout 60000

      - run: npm run test:e2e
        env:
          CI: true
          APP_URL: http://localhost:3000
